<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>馬鹿工房 (UMA SHIKA KOBO) | オリジナルWebゲーム＆アプリ</title>
    <link rel="icon" href="favicon.png" type="image/png">
    <style>
        /* 阿部寛さんのサイトのようなシンプルなレイアウト設定 */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            font-family: "MS PGothic", sans-serif;
            background-color: #ffffff;
        }

        /* 左側の帯（サイドバー） */
        #sidebar {
            width: 200px;
            height: 100vh;
            border-right: 2px solid #000000;
            padding: 10px;
            box-sizing: border-box;
            background-color: #f0f0f0; /* 帯としての色 */
            position: fixed;
        }

        /* メインコンテンツエリア */
        #main-content {
            margin-left: 200px; /* サイドバーの幅分空ける */
            padding: 20px;
            flex: 1;
        }

        /* サイドバー内のfavicon表示 */
        .sidebar-icon {
            display: block;
            margin-bottom: 20px;
            width: 32px;
            height: 32px;
        }

        .menu-item {
            display: block;
            margin: 10px 0;
            color: #0000ff;
            text-decoration: underline;
            cursor: pointer;
        }

        /* 元のサイトのスタイルを維持するための簡易設定 */
        .game-card {
            margin-bottom: 30px;
            border-bottom: 1px solid #ccc;
            padding-bottom: 10px;
        }
        h1 { font-size: 24px; border-bottom: 3px double #000; }
        h2 { font-size: 20px; }
        .play-link { color: red; font-weight: bold; }
    </style>
</head>
<body>

    <nav id="sidebar">
        <img src="favicon.png" alt="icon" class="sidebar-icon">
        
        <div class="menu-list">
            <span class="menu-item" onclick="showAbout()">about</span>
            <br>
            <a href="index.html" class="menu-item">トップへ戻る</a>
        </div>
    </nav>

    <main id="main-content">
        <div id="content-body">
            <h1>馬鹿工房 / UMA SHIKA KOBO</h1>
            <p>オリジナルWebゲーム＆アプリを公開しています。</p>

            <section class="game-card">
                <h2>Cyberpunk Orca Maze</h2>
                <p>サイバーパンク風の3D迷路ゲーム。</p>
                <a href="./3d-maze/index.html" class="play-link">PLAY NOW →</a>
            </section>

            <section class="game-card">
                <h2>Walking Orca</h2>
                <p>元シャチ</p>
                <a href="./syati2/index.html" class="play-link">PLAY NOW →</a>
            </section>
        </div>
    </main>

    <script>
        /**
         * aboutがクリックされた際に、
         * 別のサイトを開いたかのように中身を「テスト」に書き換える関数
         */
        function showAbout() {
            const contentBody = document.getElementById('content-body');
            // コンテンツをクリアして「テスト」という文字を表示
            contentBody.innerHTML = `
                <h1>about</h1>
                <p>テスト</p>
            `;
        }
    </script>

</body>
</html>
